<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emerging Technology Lifecycle</title>
<style>
body{
	font-family: Arial, sans-serif;
	background:#f5f5f5;
	text-align:center;
}
h2{
	margin-top:20px;
}
#chart{
	background:white;
	border:1px solid #ccc;
	margin:auto;
	width:900px;
	height:500px;
	position:relative;
}
.axis{
	position:absolute;
	background:black;
}
#yaxis{
	left:60px;
	top:40px;
	width:2px;
	height:380px;
}
#xaxis{
	left:60px;
	bottom:80px;
	height:2px;
	width:760px;
}
.label{
	position:absolute;
	cursor:move;
	background:#ffffffdd;
	padding:6px;
	border-radius:4px;
	font-size:13px;
}
.phase{
	position:absolute;
	width:3px;
	background:#444;
	top:40px;
	height:380px;
	cursor:ew-resize;
}
canvas{
	position:absolute;
	left:60px;
	top:40px;
}
.phaseText{
	position:absolute;
	bottom:50px;
	font-weight:bold;
}
</style>
</head>
<body>
<h2>Emerging Technology Lifecycle</h2>
<p>Drag the vertical lines and labels to explore the model.</p>
<div id="chart">
	<div id="yaxis"></div>
	<div id="xaxis"></div>
	<canvas id="graph" width="760" height="380"></canvas>
	<div id="phase1" class="phase" style="left:250px"></div>
	<div id="phase2" class="phase" style="left:520px"></div>
	<div class="phaseText" id="p1" style="left:150px">Pre-emergence</div>
	<div class="phaseText" id="p2" style="left:350px">Emergence</div>
	<div class="phaseText" id="p3" style="left:640px">Post-emergence</div>
	<div class="label" id="label1" style="left:650px; top:80px">
		Relatively fast growth<br>Coherence<br>Prominent impact
	</div>
	<div class="label" id="label2" style="left:600px; top:260px">
		Radical novelty<br>Uncertainty<br>Ambiguity
	</div>
</div>
<script>
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");
const phase1 = document.getElementById("phase1");
const phase2 = document.getElementById("phase2");

function drawGraph(){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	let p1 = phase1.offsetLeft - 60;
	let p2 = phase2.offsetLeft - 60;
	ctx.lineWidth = 3;
	// decreasing uncertainty curve
	ctx.beginPath();
	ctx.moveTo(0,50);
	for(let x=0;x<760;x++){
		let y = 50 + 300/(1+Math.exp(-(x-p1)/60));
		ctx.lineTo(x,y);
	}
	ctx.strokeStyle="#888";
	ctx.stroke();
	// increasing impact curve
	ctx.beginPath();
	ctx.moveTo(0,350);
	for(let x=0;x<760;x++){
		let y = 350 - 300/(1+Math.exp(-(x-p1)/60));
		ctx.lineTo(x,y);
	}
	ctx.strokeStyle="#000";
	ctx.stroke();
}
drawGraph();

// draggable phases
function dragElement(el){
	let pos1=0, pos3=0;
	el.onmousedown = dragMouseDown;
	function dragMouseDown(e){
		e.preventDefault();
		pos3 = e.clientX;
		document.onmouseup = closeDrag;
		document.onmousemove = elementDrag;
	}
	function elementDrag(e){
		e.preventDefault();
		pos1 = pos3 - e.clientX;
		pos3 = e.clientX;
		el.style.left = (el.offsetLeft - pos1) + "px";
		drawGraph();
	}
	function closeDrag(){
		document.onmouseup=null;
		document.onmousemove=null;
	}
}
dragElement(phase1);
dragElement(phase2);
// draggable labels
document.querySelectorAll(".label").forEach(dragElement);
</script>
</body>
</body>
</html>
